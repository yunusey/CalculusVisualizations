# Reproducible Godot 4.3 exports via Nix (see flake.nix / flake.lock).
name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".gitattributes"
      - "LICENSE"
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build web export
        run: |
          nix build .#web -L -o artifacts-web
          ls -lah artifacts-web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculus-visualizations-web
          path: artifacts-web/
          if-no-files-found: error

      - name: Prepare GitHub Pages bundle
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p _site
          cp -a artifacts-web/. _site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  linux:
    name: Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Linux export
        run: |
          nix build .#linux-portable -L -o artifacts-linux
          ls -lah artifacts-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculus-visualizations-linux-x86_64
          path: artifacts-linux/
          if-no-files-found: error

  deploy:
    name: Deploy GitHub Pages
    needs: web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
